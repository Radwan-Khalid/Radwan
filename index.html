<style>
:root{
  --primary:#1B4B7A;
  --primaryDark:#123353;
  --primaryLight:#EAF1F8;
  --amber:#F0A83C;
  --amberBg:#FDF2E3;
  --red:#E14B4B;
  --redBg:#FDEBEB;
  --green:#2FA84F;
  --greenBg:#EAF7EE;
  --bg:#F3F6FA;
  --border:#E4E9F1;
  --text:#1F2A37;
  --muted:#7C8896;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;height:100%;}
body{
  font-family:system-ui,-apple-system,"Segoe UI",Tahoma,Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
  -webkit-tap-highlight-color:transparent;
}
button,input,textarea,select{font-family:inherit;}
#app{min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;}
.screen{display:flex;flex-direction:column;flex:1;min-height:100vh;min-height:100dvh;background:var(--bg);}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.px16{padding-inline:16px;}
.pt16{padding-top:16px;}

/* ---------- Header ---------- */
.header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;color:#fff;background:var(--primary);flex-shrink:0;
}
.header .header-left{display:flex;align-items:center;gap:8px;}
.header .back-btn{background:none;border:none;color:#fff;padding:4px;display:flex;cursor:pointer;}
.header .header-title{font-weight:700;font-size:15px;}

/* ---------- Top banner (home screens) ---------- */
.top-banner{padding:18px 16px;color:#fff;background:var(--primary);flex-shrink:0;}
.top-banner .greet{font-size:12px;color:rgba(255,255,255,.72);}
.top-banner .name{font-weight:700;font-size:16px;margin-top:2px;}
.top-banner-row{display:flex;align-items:center;justify-content:space-between;}
.icon-btn{background:none;border:none;color:#fff;cursor:pointer;padding:4px;display:flex;}

/* ---------- Bottom nav ---------- */
.bottom-nav{
  display:flex;align-items:center;justify-content:space-around;
  border-top:1px solid var(--border);background:#fff;padding:6px 2px;flex-shrink:0;
}
.nav-item{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:5px 2px;flex:1;background:none;border:none;cursor:pointer;position:relative;
}
.nav-item .nav-ic{font-size:18px;line-height:1;}
.nav-item .nav-label{font-size:9px;color:var(--muted);font-weight:600;}
.nav-item.active .nav-label{color:var(--primary);font-weight:700;}
.nav-item .nav-badge{
  position:absolute;top:0;inset-inline-end:14px;background:var(--red);color:#fff;
  font-size:9px;font-weight:700;border-radius:99px;min-width:15px;height:15px;
  display:flex;align-items:center;justify-content:center;padding:0 3px;
}

/* ---------- Buttons ---------- */
.btn{border:none;cursor:pointer;font-family:inherit;}
.btn-primary{
  background:var(--primary);color:#fff;font-weight:700;font-size:14px;
  border-radius:12px;padding:13px;width:100%;display:flex;align-items:center;
  justify-content:center;gap:8px;
}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;}
.btn-outline{
  background:#fff;border:1px solid var(--border);border-radius:12px;padding:11px;
  font-weight:700;font-size:13px;color:var(--primary);width:100%;cursor:pointer;
}
.btn-green{background:var(--green);color:#fff;}
.btn-sm{
  border-radius:9px;padding:7px 12px;font-size:11px;font-weight:700;
  display:inline-flex;align-items:center;gap:4px;cursor:pointer;border:none;
}
.btn-sm-allow{background:#16A34A;color:#fff;}
.btn-sm-reject{background:var(--redBg);color:var(--red);}
.btn-sm-danger{background:var(--redBg);color:var(--red);}
.link-btn{background:none;border:none;color:var(--primary);font-weight:700;font-size:12px;cursor:pointer;padding:0;}

/* ---------- Cards ---------- */
.card{
  background:#fff;border:1px solid var(--border);border-radius:16px;padding:14px;
  width:100%;text-align:start;
}
.role-card{
  display:flex;align-items:center;gap:12px;background:#fff;border:1px solid var(--border);
  border-radius:16px;padding:14px;width:100%;cursor:pointer;text-align:start;
}
.role-card .role-ic{
  width:40px;height:40px;border-radius:12px;display:flex;align-items:center;
  justify-content:center;flex-shrink:0;font-size:18px;
}
.role-card .role-title{font-weight:700;font-size:14px;}
.role-card .role-desc{font-size:12px;color:var(--muted);}
.chev{color:var(--muted);font-size:18px;flex-shrink:0;}

.report-card{
  display:flex;flex-direction:column;gap:6px;background:#fff;border:1px solid var(--border);
  border-radius:16px;padding:14px;width:100%;cursor:pointer;text-align:start;
}
.report-card .row-between{display:flex;align-items:center;justify-content:space-between;width:100%;}
.report-card .dept{font-weight:700;font-size:14px;}
.report-card .desc{
  font-size:12px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;max-height:34px;
}
.report-card .meta-row{display:flex;align-items:center;justify-content:space-between;width:100%;padding-top:2px;}
.report-card .prio{display:flex;align-items:center;gap:4px;}
.report-card .dot{width:7px;height:7px;border-radius:99px;}
.report-card .idnum{font-size:11px;font-weight:700;color:var(--muted);}
.report-card .datestamp{font-size:10px;color:var(--muted);}
.report-card .assigned-line{font-size:10px;font-weight:700;color:var(--primary);margin-top:2px;}

.stat-card{background:#fff;border:1px solid var(--border);border-radius:16px;padding:14px;}
.stat-card .stat-val{font-weight:700;font-size:22px;}
.stat-card .stat-label{font-size:10px;color:var(--muted);margin-top:3px;white-space:nowrap;}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

/* ---------- Badges ---------- */
.badge{
  font-size:10px;font-weight:700;padding:4px 10px;border-radius:99px;
  white-space:nowrap;display:inline-block;
}

/* ---------- Forms ---------- */
.field-block{margin-bottom:14px;}
.field-label{font-size:12px;font-weight:700;color:var(--text);display:block;margin-bottom:5px;}
.input,.select,.textarea{
  width:100%;border:1px solid var(--border);border-radius:12px;padding:11px 13px;
  font-size:14px;background:#fff;color:var(--text);outline:none;
}
.input:focus,.select:focus,.textarea:focus{border-color:var(--primary);}
.textarea{resize:none;}
.priority-row{display:flex;gap:8px;}
.priority-btn{
  flex:1;border-radius:12px;padding:10px 4px;font-size:12px;font-weight:700;
  border:2px solid var(--border);background:#fff;color:var(--muted);cursor:pointer;
}

.readonly-field .field-label{font-size:10px;font-weight:700;color:var(--muted);}
.readonly-field .field-value{font-size:13px;font-weight:500;margin-top:2px;}

/* ---------- Empty state ---------- */
.empty{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:52px 20px;gap:10px;text-align:center;color:var(--muted);width:100%;
}
.empty .empty-ic{
  width:48px;height:48px;border-radius:99px;background:var(--primaryLight);
  display:flex;align-items:center;justify-content:center;font-size:20px;
}
.empty p{font-size:12px;margin:0;max-width:220px;}
.empty .link-btn{font-size:12px;margin-top:2px;}

/* ---------- Menu rows (profile) ---------- */
.menu-row{
  display:flex;align-items:center;gap:12px;background:#fff;border:1px solid var(--border);
  border-radius:12px;padding:12px 14px;margin-bottom:8px;width:100%;font-size:13px;
  font-weight:600;cursor:pointer;text-align:start;
}
.menu-row .menu-ic{font-size:16px;width:20px;text-align:center;}
.menu-row.danger{color:var(--red);}
.menu-row .menu-label{flex:1;}

/* ---------- Assign / radio list ---------- */
.radio-row{
  display:flex;align-items:center;gap:12px;background:#fff;border-radius:12px;
  padding:11px 14px;border:1px solid var(--border);cursor:pointer;margin-bottom:8px;
}
.radio-row.checked{border-color:var(--primary);}
.radio-dot{
  width:16px;height:16px;border-radius:99px;border:2px solid var(--border);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.radio-row.checked .radio-dot{border-color:var(--primary);background:var(--primary);}
.radio-dot .inner{width:6px;height:6px;border-radius:99px;background:#fff;display:none;}
.radio-row.checked .inner{display:block;}

/* ---------- Login role screen ---------- */
.login-hero{
  display:flex;flex-direction:column;align-items:center;padding:34px 16px 24px;
  background:var(--primary);position:relative;flex-shrink:0;
}
.lang-toggle{
  position:absolute;top:16px;inset-inline-start:16px;background:rgba(255,255,255,.15);
  border:none;color:#fff;font-size:11px;font-weight:700;border-radius:10px;
  padding:6px 10px;display:flex;align-items:center;gap:5px;cursor:pointer;
}
.hero-ic{
  width:56px;height:56px;border-radius:16px;background:rgba(255,255,255,.15);
  display:flex;align-items:center;justify-content:center;margin-bottom:10px;font-size:24px;
}
.login-hero h1{color:#fff;font-weight:700;font-size:16px;margin:0;}
.login-hero p{color:rgba(255,255,255,.72);font-size:11px;margin:4px 0 0;}
.roles-title{font-size:13px;font-weight:700;margin:0 0 4px;padding-inline:20px;}
.roles-list{display:flex;flex-direction:column;gap:10px;padding:16px 20px;}

.avatar-circle{
  width:64px;height:64px;border-radius:99px;display:flex;align-items:center;
  justify-content:center;margin:0 auto 12px;font-size:26px;
}
.center-col{display:flex;flex-direction:column;align-items:center;}

.banner-warning{
  display:flex;align-items:center;gap:10px;background:var(--amberBg);border:1px solid #F5DDB0;
  border-radius:12px;padding:11px 13px;cursor:pointer;width:100%;text-align:start;
}
.banner-warning .warn-text{font-size:11px;font-weight:700;color:#8a5a12;flex:1;}

.setup-screen{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;min-height:100dvh;padding:28px;text-align:center;gap:14px;background:var(--bg);
}
.setup-screen .big-ic{font-size:40px;}
.setup-screen h2{margin:0;font-size:16px;}
.setup-screen p{margin:0;font-size:13px;color:var(--muted);line-height:1.7;max-width:320px;}
.setup-screen code{
  background:#fff;border:1px solid var(--border);border-radius:8px;padding:2px 6px;
  font-size:12px;direction:ltr;display:inline-block;
}

.repair-note-box{background:var(--greenBg);border-radius:12px;padding:12px;}
.repair-note-box .rn-title{font-size:11px;font-weight:700;color:var(--green);margin-bottom:4px;}
.repair-note-box .rn-text{font-size:12px;}

.connecting-hint{
  display:flex;align-items:center;gap:8px;background:var(--primaryLight);color:var(--primary);
  font-size:11px;font-weight:600;padding:9px 13px;border-radius:10px;margin:10px 16px 0;
}

.gap8>*+*{margin-top:8px;}
.gap10>*+*{margin-top:10px;}
.gap12>*+*{margin-top:12px;}
.gap14>*+*{margin-top:14px;}

.text-center{text-align:center;}
.muted{color:var(--muted);}
.small{font-size:11px;}
.bold{font-weight:700;}

/* scrollbar tidy on desktop preview */
.scroll::-webkit-scrollbar{width:0;height:0;}

</style>

function esc(str){
  return String(str == null ? '' : str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
// نفس esc لكن مخصص لتضمين نص داخل onclick='...' (سلسلة جافاسكربت)
function escJs(str){
  return String(str == null ? '' : str)
    .replace(/\\/g,'\\\\').replace(/'/g,"\\'")
    .replace(/&/g,'&amp;').replace(/"/g,'&quot;')
    .replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function newId(prefix){
  return prefix + Date.now() + Math.random().toString(36).slice(2,7);
}
function sortedByTsAsc(arr){ return arr.slice().sort(function(a,b){ return (a.ts||0)-(b.ts||0); }); }
function sortedByTsDesc(arr){ return arr.slice().sort(function(a,b){ return (b.ts||0)-(a.ts||0); }); }
function objToArr(obj){
  if (!obj) return [];
  return Object.keys(obj).map(function(id){
    const copy = Object.assign({}, obj[id]);
    copy.id = id;
    return copy;
  });
}
function fmtDate(){
  const d = new Date();
  const h = d.getHours();
  const displayH = (h % 12) === 0 ? 12 : (h % 12);
  const m = String(d.getMinutes()).padStart(2,'0');
  const suffix = state.lang === 'ar' ? (h >= 12 ? 'م' : 'ص') : (h >= 12 ? 'PM' : 'AM');
  return d.getDate() + '/' + (d.getMonth()+1) + '/' + d.getFullYear() + ' - ' + displayH + ':' + m + ' ' + suffix;
}
function chevForward(){ return state.lang === 'ar' ? '‹' : '›'; }
function chevBack(){ return state.lang === 'ar' ? '›' : '‹'; }

function statusMeta(code){
  if (code === 'done') return { fg:'var(--green)', bg:'var(--greenBg)', text:t('status_done') };
  if (code === 'in_progress') return { fg:'var(--amber)', bg:'var(--amberBg)', text:t('status_processing') };
  return { fg:'var(--amber)', bg:'var(--amberBg)', text:t('status_pending') };
}
function priorityMeta(code){
  if (code === 'high') return { fg:'var(--red)', bg:'var(--redBg)', text:t('high') };
  if (code === 'low') return { fg:'var(--green)', bg:'var(--greenBg)', text:t('low') };
  return { fg:'var(--amber)', bg:'var(--amberBg)', text:t('medium') };
}

// ---------------------------------------------------------------------------
// 5) الاتصال بـ Firebase (قراءة وكتابة البيانات أونلاين)
// ---------------------------------------------------------------------------
let db = null;
let firebaseOK = false;
let connectTimer = null;

function initFirebase(){
  const looksConfigured =
    FIREBASE_CONFIG.apiKey && FIREBASE_CONFIG.apiKey.indexOf('ضع') === -1 &&
    FIREBASE_CONFIG.databaseURL && FIREBASE_CONFIG.databaseURL.indexOf('ضع') === -1;
  if (!looksConfigured){ firebaseOK = false; return; }
  try{
    firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.database();
    firebaseOK = true;
    attachListeners();
    connectTimer = setTimeout(function(){
      const L = state._loaded;
      if (!L.departments && !L.reports && !L.techRequests && !L.activeTechs){
        state.connectionSlow = true;
        render();
      }
    }, 9000);
  } catch(e){
    console.error('Firebase init error:', e);
    firebaseOK = false;
  }
}
function clearConnectTimer(){
  if (connectTimer){ clearTimeout(connectTimer); connectTimer = null; }
  state.connectionSlow = false;
}
function attachListeners(){
  db.ref('departments').on('value', function(snap){
    state.departments = sortedByTsAsc(objToArr(snap.val()));
    state._loaded.departments = true;
    clearConnectTimer();
    render();
  });
  db.ref('reports').on('value', function(snap){
    const newReports = sortedByTsDesc(objToArr(snap.val()));

    // كشف التغييرات لإطلاق إشعارات (فقط بعد أول تحميل، حتى ما تنطلق إشعارات
    // لبلاغات قديمة موجودة أصلاً وقت فتح التطبيق)
    if (state._loaded.reports && state.user){
      if (state.user.role === 'manager'){
        const oldIds = {};
        state.reports.forEach(function(r){ oldIds[r.id] = true; });
        newReports.forEach(function(r){
          if (!oldIds[r.id]){
            notify(t('notifyNewReportTitle'), r.department + ' — ' + truncateText(r.description, 60));
          }
        });
      }
      if (state.user.role === 'tech'){
        const oldById = {};
        state.reports.forEach(function(r){ oldById[r.id] = r; });
        newReports.forEach(function(r){
          const old = oldById[r.id];
          const wasMine = old && old.assignedTo === state.user.name;
          const isMineNow = r.assignedTo === state.user.name;
          if (isMineNow && !wasMine){
            notify(t('notifyNewTaskTitle'), r.department + ' — ' + truncateText(r.description, 60));
          }
        });
      }
    }

    state.reports = newReports;
    if (state.selected){
      let upd = null;
      for (let i=0;i<state.reports.length;i++){ if (state.reports[i].id === state.selected.id) upd = state.reports[i]; }
      state.selected = upd;
    }
    state._loaded.reports = true;
    clearConnectTimer();
    render();
  });
  db.ref('techRequests').on('value', function(snap){
    state.techRequests = sortedByTsAsc(objToArr(snap.val()));
    state._loaded.techRequests = true;
    clearConnectTimer();
    render();
  });
  db.ref('activeTechs').on('value', function(snap){
    state.activeTechs = sortedByTsAsc(objToArr(snap.val()));
    state._loaded.activeTechs = true;
    clearConnectTimer();
    if (state.screen === 'pending' && state._pendingName){
      const found = state.activeTechs.some(function(x){ return x.name === state._pendingName; });
      if (found){
        const nm = state._pendingName;
        state._pendingName = null;
        completeLogin('tech', nm);
        return;
      }
    }
    render();
  });
}
function fbSet(path, val){
  if (!db) return;
  db.ref(path).set(val).catch(function(e){ console.error('Firebase set error', path, e); });
}
function fbUpdate(path, patch){
  if (!db) return;
  db.ref(path).update(patch).catch(function(e){ console.error('Firebase update error', path, e); });
}
function fbRemove(path){
  if (!db) return;
  db.ref(path).remove().catch(function(e){ console.error('Firebase remove error', path, e); });
}

function requestNotifyPermission(){
  if (!('Notification' in window)) return;
  if (Notification.permission === 'default'){
    try{ Notification.requestPermission(); }catch(e){}
  }
}
function notify(title, body){
  if (!('Notification' in window)) return;
  if (Notification.permission !== 'granted') return;
  const opts = { body: body, icon: './ic_launcher.png', dir: state.lang==='ar' ? 'rtl' : 'ltr' };
  if (navigator.serviceWorker && navigator.serviceWorker.ready){
    navigator.serviceWorker.ready.then(function(reg){
      if (reg && reg.showNotification) reg.showNotification(title, opts);
      else new Notification(title, opts);
    }).catch(function(){
      try{ new Notification(title, opts); }catch(e){}
    });
  } else {
    try{ new Notification(title, opts); }catch(e){}
  }
}
function truncateText(str, n){
  str = String(str||'');
  return str.length > n ? str.slice(0,n) + '…' : str;
}

function openReport(id){
  const r = state.reports.find(function(x){ return x.id===id; });
  if (!r) return;
  state.selected = r;
  state.assignPick = r.assignedTo || '';
  state.assignNote = r.managerNote || '';
  state.repairNote = '';
  render();
}
function closeReport(){
  state.selected = null; state.assignPick=''; state.repairNote='';
  render();
}
function selectRole(role){
  state.selectedRole = role;
  state.nameInput=''; state.passcodeInput=''; state.loginError='';
  state.screen = 'login';
  render();
}
function setScreen(scr){
  state.screen = scr;
  if (scr==='role') state.selectedRole = null;
  render();
}
function switchLang(){
  state.lang = state.lang==='ar' ? 'en' : 'ar';
  render();
}
function setTab(tabKey){
  state.tab = tabKey;
  state.selected = null;
  render();
}
function doLogout(){
  clearSession();
  state.user=null; state.tab=null; state.screen='role'; state.selectedRole=null; state.selected=null;
  render();
}
function doLogin(){
  const role = state.selectedRole;
  const name = state.nameInput.trim();
  if (!name) return;
  if (role === 'manager'){
    if (state.passcodeInput === MANAGER_PASSCODE){
      completeLogin(role, name);
    } else {
      state.loginError = t('wrongPasscode');
      refreshLoginError();
    }
    return;
  }
  if (role === 'tech'){
    const isActive = state.activeTechs.some(function(x){ return x.name===name; });
    if (isActive){ completeLogin(role, name); return; }
    const alreadyPending = state.techRequests.some(function(x){ return x.name.toLowerCase()===name.toLowerCase(); });
    if (!alreadyPending){
      const id = newId('tr');
      fbSet('techRequests/'+id, { name:name, ts:Date.now() });
    }
    state._pendingName = name;
    state.screen = 'pending';
    render();
    return;
  }
  completeLogin(role, name);
}
function completeLogin(role, name){
  state.user = { role:role, name:name };
  state.tab = role==='manager' ? 'dashboard' : (role==='tech' ? 'tasks' : 'home');
  state.screen = null;
  state.nameInput=''; state.passcodeInput=''; state.loginError='';
  saveSession(state.user);
  requestNotifyPermission();
  render();
}

function render(){
  document.documentElement.setAttribute('lang', state.lang);
  document.documentElement.setAttribute('dir', state.lang==='ar' ? 'rtl' : 'ltr');
  const root = document.getElementById('app');
  if (!root) return;

  if (!firebaseOK){ root.innerHTML = buildSetupScreen(); return; }

  let html;
  if (!state.user){
    if (state.screen==='pending') html = buildPendingScreen();
    else if (state.screen==='login') html = buildLoginScreen();
    else html = buildRoleScreen();
  } else if (state.user.role==='user') html = buildUserApp();
  else if (state.user.role==='manager') html = buildManagerApp();
  else html = buildTechApp();

  if (state.connectionSlow){
    html = '<div class="connecting-hint">⚠️ ' + esc(t('connectionTrouble')) + '</div>' + html;
  }
  root.innerHTML = html;
}

// ---------------------------------------------------------------------------
// 14) الإقلاع
// ---------------------------------------------------------------------------
document.addEventListener('DOMContentLoaded', function(){
  initFirebase();
  const saved = loadSession();
  if (saved){
    state.user = saved;
    state.tab = saved.role==='manager' ? 'dashboard' : (saved.role==='tech' ? 'tasks' : 'home');
    requestNotifyPermission();
  }
  render();
});

</script>
</body>
</html>
